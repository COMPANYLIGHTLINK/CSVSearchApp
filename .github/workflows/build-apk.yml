name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 is required by Android Gradle Plugin 8.x
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Install Gradle 8.4 directly via official Gradle action.
      #    This replaces gradlew entirely on CI — no wrapper jar needed.
      #    Caching is handled automatically by this action.
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      # 4. Build the APK using gradle command (not ./gradlew)
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # 5. Upload the built APK so you can download it from the Actions page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSVSearchApp-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
